version: '3.9'

services:
  mlflow:
    image: python:3.10-slim
    container_name: infartos-mlflow-preprod
    command: >
      bash -c 'pip install mlflow -q &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri file:///mlruns
               --default-artifact-root file:///mlruns
               --host-allowlist mlflow,localhost,0.0.0.0'
    ports:
      - '${MLFLOW_PORT:-5000}:5000'
    volumes:
      - mlruns_vol:/mlruns
    networks:
      - infartos-net
    healthcheck:
      test: ['CMD', 'python', '-c',
             'import urllib.request; urllib.request.urlopen("http://localhost:5000/health")']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  trainer:
    build:
      context: .
      dockerfile: Dockerfile.trainer
    container_name: infartos-trainer-preprod
    volumes:
      - artifacts_vol:/app/artifacts
      - mlruns_vol:/app/mlruns
      - ./data:/app/data:ro
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - MLFLOW_EXPERIMENT=${MLFLOW_EXPERIMENT:-infartos-prevencion-preprod}
      - PIPELINE_VERSION=${MODEL_VERSION:-latest}
    networks:
      - infartos-net
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infartos-api-preprod
    ports:
      - '${API_PORT:-8000}:8000'
    volumes:
      - artifacts_vol:/app/artifacts:ro
    environment:
      - PIPELINE_VERSION=${MODEL_VERSION:-latest}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-False}
    depends_on:
      trainer:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'python', '-c',
             'import httpx; httpx.get("http://localhost:8000/health")']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - infartos-net

volumes:
  artifacts_vol:
  mlruns_vol:

networks:
  infartos-net:
    driver: bridge
