version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infartos-api
    ports:
      - '8000:8000'
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - PIPELINE_VERSION=v1.0.0
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c',
             'import httpx; httpx.get("http://localhost:8000/health")']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infartos-net

  mlflow:
    image: python:3.10-slim
    container_name: infartos-mlflow
    command: >
      bash -c 'pip install mlflow -q &&
               mlflow ui --host 0.0.0.0 --port 5000
               --backend-store-uri file:///mlruns'
    ports:
      - '5000:5000'
    volumes:
      - ./mlruns:/mlruns
    networks:
      - infartos-net

networks:
  infartos-net:
    driver: bridge
