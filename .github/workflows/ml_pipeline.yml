name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 src/ pipeline/ api/ tests/ --config=setup.cfg

      - name: Tests unitarios
        run: |
          pytest tests/ -v --tb=short --cov=src --cov=api \
                 --cov-report=xml --ignore=tests/smoke

      - name: Subir coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  train-model:
    name: Train + Validate
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar dataset (desde release o generar sintético)
        run: |
          mkdir -p data
          python -c "
          import pandas as pd, numpy as np
          np.random.seed(42)
          n = 5000
          pos = int(n * 0.018)
          neg = n - pos
          def gen(n_rows, infarto):
              return pd.DataFrame({
                  'ID': range(n_rows),
                  'Genero': np.random.choice(['Hombre','Mujer'], n_rows),
                  'Edad': np.random.randint(20, 85, n_rows).astype(float),
                  'Flag_hipertension': np.random.randint(0, 2, n_rows),
                  'Flag_problem_cardiaco': np.random.randint(0, 2, n_rows),
                  'Estados_civil': np.random.choice(['Si','No'], n_rows),
                  'Tipo_trabajo': np.random.choice(['Empresa_privada','Emprendedor','Gobierno','cuidar_ninos'], n_rows),
                  'Zona_residencia': np.random.choice(['Urbano','Rural'], n_rows),
                  'Promedio_nivel_glucosa': np.random.uniform(60, 300, n_rows),
                  'IMC': np.where(np.random.rand(n_rows) < 0.034, np.nan, np.random.uniform(15, 50, n_rows)),
                  'Flag_fumador': np.where(np.random.rand(n_rows) < 0.31, None, np.random.choice(['Nunca_fuma','antes_fumaba','fuma'], n_rows)),
                  'Ataque_cardiaco': infarto,
              })
          df = pd.concat([gen(neg, 0), gen(pos, 1)]).sample(frac=1, random_state=42)
          df.to_csv('data/dataset.csv', sep=';', index=False)
          print(f'Dataset sintético: {len(df)} filas')
          "

      - name: Entrenar pipeline (con pisos relajados para dataset sintético)
        env:
          RECALL_MIN: '0.30'
          F1_MIN: '0.02'
        run: python run_pipeline.py

      - name: Validar quality gate
        env:
          RECALL_MIN: '0.30'
          F1_MIN: '0.02'
        run: |
          python -c "
          import json; from config import METRICS_PATH, RECALL_MINIMO, F1_MINIMO
          m = json.load(open(METRICS_PATH))
          r, f = m['recall'], m['f1']
          print(f'Recall={r:.4f} (min={RECALL_MINIMO}) | F1={f:.4f} (min={F1_MINIMO})')
          fallos = []
          if r < RECALL_MINIMO: fallos.append(f'recall {r:.4f} < {RECALL_MINIMO}')
          if f < F1_MINIMO:     fallos.append(f'f1 {f:.4f} < {F1_MINIMO}')
          assert not fallos, 'Quality gate FALLIDO: ' + ' | '.join(fallos)
          print('Quality gate APROBADO')
          "

      - name: Subir artifacts del modelo
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

  build-docker:
    name: Build Docker + Smoke
    runs-on: ubuntu-latest
    needs: train-model
    steps:
      - uses: actions/checkout@v4

      - name: Descargar artifacts del modelo
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Construir imagen Docker
        run: docker build -t infartos-api:${{ github.sha }} .

      - name: Arrancar API
        run: |
          docker run -d -p 8000:8000 \
            --name infartos-api-test \
            infartos-api:${{ github.sha }}
          sleep 15

      - name: Smoke test - health
        run: curl -f http://localhost:8000/health

      - name: Smoke test - predicción
        run: |
          curl -f -X POST http://localhost:8000/predecir \
            -H "Content-Type: application/json" \
            -d '{"Genero":"Hombre","Edad":65,"Flag_hipertension":1,
                 "Flag_problem_cardiaco":1,"Estados_civil":"Si",
                 "Tipo_trabajo":"Empresa_privada","Zona_residencia":"Urbano",
                 "Promedio_nivel_glucosa":220.5,"IMC":32.1,
                 "Flag_fumador":"antes_fumaba"}'

      - name: Limpiar contenedor
        if: always()
        run: docker rm -f infartos-api-test || true
